# ──────────────────────────────────────────────────────────────────────────────
# Tempo — Tracing backend
# ──────────────────────────────────────────────────────────────────────────────
tempo:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"
  retention: 24h
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

persistence:
  enabled: true
  storageClassName: standard-rwo
  size: 20Gi

serviceMonitor:
  enabled: true
