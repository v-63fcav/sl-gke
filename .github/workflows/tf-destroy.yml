name: Terraform Destroy

on:
  workflow_dispatch:

# Mesmo grupo do tf-deploy.yml — impede que destroy e deploy rodem ao mesmo tempo.
# cancel-in-progress: false → nunca cancela um destroy em andamento.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  destroy-infra:
    name: Terraform Destroy - Infra
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=sl-gke-tf-state-cavi" \
            -backend-config="prefix=terraform/infra"

      - name: Terraform Destroy - Infra
        run: terraform destroy -auto-approve
